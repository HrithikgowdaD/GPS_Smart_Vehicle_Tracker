<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment | Smart Toll</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    max-width: 540px;
  }

  /* ---------- MAIN CARD ---------- */
  .card {
    border-radius: 22px;
    padding: 34px;
    background: #ffffff;
    border: none;
    box-shadow:
      0 15px 40px rgba(0,0,0,0.18),
      0 40px 80px rgba(0,0,0,0.15);
  }

  h4 {
    font-weight: 800;
    color: #0f172a;
    text-align: center;
    margin-bottom: 28px;
  }

  label {
    font-size: 14px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 6px;
  }

  .form-select,
  .form-control {
    height: 50px;
    border-radius: 14px;
    border: 1px solid #c7d2fe;
    padding: 12px 16px;
    font-size: 15px;
    transition: all 0.25s ease;
  }

  .form-select:focus,
  .form-control:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
  }

  /* ---------- BUTTON ---------- */
  .btn-pay {
    margin-top: 10px;
    height: 54px;
    border-radius: 16px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    border: none;
    color: #ffffff;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.4px;
    transition: all 0.3s ease;
  }

  .btn-pay:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 35px rgba(34,197,94,0.45);
  }

  /* ---------- CHECKOUT MODAL ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,6,23,0.65);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(6px);
  }

  .checkout {
    width: 420px;
    background: #ffffff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 35px 80px rgba(0,0,0,0.45);
    animation: popIn 0.3s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* ---------- HEADER ---------- */
  .checkout-header {
    background: linear-gradient(135deg, #4f46e5, #22c55e);
    color: #ffffff;
    padding: 22px;
    position: relative;
  }

  .checkout-header h6 {
    margin: 0;
    font-weight: 700;
    letter-spacing: 0.4px;
  }

  .amount {
    font-size: 28px;
    font-weight: 800;
    margin-top: 6px;
  }

  .close-btn {
    position: absolute;
    right: 18px;
    top: 16px;
    font-size: 20px;
    cursor: pointer;
    opacity: 0.9;
  }

  /* ---------- BODY ---------- */
  .checkout-body {
    padding: 24px;
  }

  .user-box {
    background: linear-gradient(135deg, #eef2ff, #ecfeff);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 22px;
    text-align: center;
    border: 1px solid #c7d2fe;
  }

  .user-box strong {
    font-size: 18px;
    color: #1e293b;
    letter-spacing: 0.4px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: #475569;
    margin-bottom: 12px;
  }

  /* ---------- PAYMENT OPTIONS ---------- */
  .pay-option {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .pay-option:hover {
    transform: translateX(4px);
  }

  .pay-icon {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: #ffffff;
  }

  .card-pay { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
  .upi-pay { background: linear-gradient(135deg, #f97316, #ea580c); }
  .net-pay { background: linear-gradient(135deg, #9333ea, #7e22ce); }
  .wallet-pay { background: linear-gradient(135deg, #22c55e, #16a34a); }

  /* ---------- FOOTER ---------- */
  .checkout-footer {
    padding: 16px;
    font-size: 12px;
    color: #475569;
    border-top: 1px solid #e5e7eb;
    background: #f8fafc;
    text-align: center;
    font-weight: 500;
  }
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h4>Add Wallet Balance</h4>

    <form id="walletForm" method="POST" action="{{ url_for('wallet_submit') }}">

      <label>Select Vehicle</label>
      <select name="vehicle_no" id="vehicleSelect" class="form-select mb-3" required>
        <option value="">-- Select Vehicle --</option>
        {% for v in vehicles %}
          <option value="{{ v.vehicle_no }}">{{ v.vehicle_no }}</option>
        {% endfor %}
      </select>

      <label>Amount (₹)</label>
      <input type="number" id="amount" name="amount" class="form-control mb-2" min="10" required>

      <small class="text-muted d-block mb-3">Minimum recharge ₹10</small>

      <input type="hidden" name="payment_mode" id="hiddenPaymentMode">

      <button type="button" class="btn btn-pay w-100" onclick="openCheckout()">
        Proceed to Pay
      </button>

    </form>
  </div>
</div>

<!-- ---------- CHECKOUT MODAL ---------- -->
<div class="overlay" id="checkoutModal">
  <div class="checkout">

    <div class="checkout-header">
      <span class="close-btn" onclick="closeCheckout()">×</span>
      <h6>SMART TOLL PAYMENTS</h6>
      <div class="amount" id="payAmount">₹0</div>
    </div>

    <div class="checkout-body">

      <div class="user-box">
        🚗 Vehicle Number<br>
        <strong id="vehicleDisplay">---</strong>
      </div>

      <div class="section-title">PAYMENT METHODS</div>

      <div class="pay-option" onclick="paySuccess('Card')">
        <div class="pay-icon card-pay">C</div>
        Credit / Debit Card
      </div>

      <div class="pay-option" onclick="paySuccess('UPI')">
        <div class="pay-icon upi-pay">U</div>
        UPI
      </div>

      <div class="pay-option" onclick="paySuccess('NetBanking')">
        <div class="pay-icon net-pay">N</div>
        Net Banking
      </div>

      <div class="pay-option" onclick="paySuccess('Wallet')">
        <div class="pay-icon wallet-pay">W</div>
        Wallet
      </div>

    </div>

    <div class="checkout-footer">
      Secure payments • Encrypted • PCI-DSS compliant
    </div>

  </div>
</div>

<script>
  function openCheckout() {
    const amount = document.getElementById("amount").value;
    const vehicle = document.getElementById("vehicleSelect").value;

    if (!amount || amount < 10 || !vehicle) return;

    document.getElementById("vehicleDisplay").textContent = vehicle;
    document.getElementById("payAmount").textContent = "₹ " + amount;
    document.getElementById("checkoutModal").style.display = "flex";
  }

  function closeCheckout() {
    document.getElementById("checkoutModal").style.display = "none";
  }

  function paySuccess(method) {
    document.getElementById("hiddenPaymentMode").value = method;
    document.getElementById("checkoutModal").style.display = "none";
    document.getElementById("walletForm").submit();
  }
</script>

</body>
</html>
